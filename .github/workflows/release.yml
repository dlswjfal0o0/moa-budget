name: Release (TestFlight)

# 수동 실행 전용 — TestFlight 업로드는 매 커밋마다 나가는 게 아니라
# 릴리스하기로 결정했을 때 의도적으로 실행한다.
on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # macos-15's default Xcode (15.4) can't resolve the
      # @capgo/capacitor-updater -> Alamofire SPM dependency (its
      # resolver rejects a valid 5.12.0 match while chasing an
      # incompatible 6.3.0 candidate). A newer Xcode resolves it fine.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      # Non-default Xcode versions on GitHub's macOS runners ship with a
      # stripped-down platform install (missing iOS SDK support), which
      # breaks the generic/platform=iOS archive destination.
      - run: sudo xcodebuild -downloadPlatform iOS

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx cap sync ios
      - run: node scripts/sync-version.js

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios/App

      - name: Build and upload to TestFlight
        working-directory: ios/App
        env:
          IOS_DIST_CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          IOS_DIST_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          IOS_CI_KEYCHAIN_PASSWORD: ${{ secrets.IOS_CI_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane beta
