name: Release (TestFlight)

# 수동 실행 전용 — TestFlight 업로드는 매 커밋마다 나가는 게 아니라
# 릴리스하기로 결정했을 때 의도적으로 실행한다.
on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Deliberately NOT pinning a specific Xcode version here: macos-14's
      # default (15.4) can't resolve the @capgo/capacitor-updater ->
      # Alamofire SPM dependency, but side-installed non-default Xcode
      # versions on GitHub's runners ship with stripped-down platform
      # installs (no iOS SDK) that `xcodebuild -downloadPlatform` can't
      # reliably fix in headless CI. macos-15's own default Xcode is newer
      # than 15.4 and comes with iOS platform support already installed.

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx cap sync ios
      - run: node scripts/sync-version.js

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios/App

      - name: Build and upload to TestFlight
        working-directory: ios/App
        env:
          IOS_DIST_CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          IOS_DIST_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          IOS_CI_KEYCHAIN_PASSWORD: ${{ secrets.IOS_CI_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane beta

      # Keep the built IPA even if the upload step fails, so it can be
      # downloaded and tried manually via Transporter to isolate whether
      # a failure is CI/altool-specific or an account/cert/profile issue.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: App-ipa
          path: ios/App/build/App.ipa
          if-no-files-found: ignore
